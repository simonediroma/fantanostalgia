<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Message, HelpBox, EmptyState, ProgressBar } = window.FantaNostalgiaDesignSystem_90de16;
    const lbl = (t) => (
      <div style={{ fontFamily:'var(--font-pixel)', fontSize:'0.38rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:'0.5rem', marginTop:'0.25rem' }}>{t}</div>
    );
    function App() {
      return (
        <div style={{ padding:'1.25rem', display:'flex', flexDirection:'column', gap:'0.25rem' }}>
          {lbl('Message')}
          <Message variant="ok">Listone importato — 250 giocatori trovati.</Message>
          <Message variant="err" onDismiss={() => {}}>Errore: file non valido o formato non riconosciuto.</Message>
          <Message variant="warn">Attenzione: questa operazione è irreversibile.</Message>
          <Message variant="info">Sorteggio giornata storica in corso...</Message>

          {lbl('HelpBox')}
          <HelpBox title="Carica Listone" variant="info">
            Importa la rosa della lega da file Excel. Usa il foglio "TutteLeRose" con due squadre affiancate.
          </HelpBox>

          {lbl('EmptyState')}
          <EmptyState message="Nessun manager ancora." action="+ Aggiungi manager" onAction={() => {}} />

          {lbl('ProgressBar')}
          <ProgressBar value={7} max={12} label="7/12 assegnati" showPercent />
          <div style={{marginTop:'0.5rem'}}><ProgressBar value={3} max={12} /></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
