name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/fantanostalgia/fantanostalgia-api:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build backend
        run: docker build -t $IMAGE -f Dockerfile.backend .

      - name: Push backend
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fantanostalgia \
            --image=$IMAGE \
            --region=europe-west1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=ENV=production,GCS_BUCKET=${{ secrets.GCS_BUCKET }},GCP_PROJECT=${{ secrets.GCP_PROJECT }},SECRET_KEY=${{ secrets.API_SECRET_KEY }},ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }},ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
