<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FantaNostalgia — Allenatori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/coach/css/coach.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">⚽ FantaNostalgia</div>
    <p class="login-sub">Area Allenatori</p>

    <div id="msgBox"></div>

    <div class="tabs" id="tabBar">
      <button class="tab-btn active" data-tab="login">Accedi</button>
      <button class="tab-btn" data-tab="register" id="registerTabBtn">Registrati</button>
    </div>

    <!-- Login -->
    <div class="tab-panel active" id="tab-login">
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="loginEmail" required autocomplete="email">
        <label>Password</label>
        <input type="password" id="loginPass" required autocomplete="current-password">
        <div style="margin-top:1rem">
          <button type="submit" style="width:100%">Accedi</button>
        </div>
      </form>
    </div>

    <!-- Register -->
    <div class="tab-panel" id="tab-register">
      <form id="registerForm">
        <label>Nome</label>
        <input type="text" id="regName" required>
        <label>Email</label>
        <input type="email" id="regEmail" required autocomplete="email">
        <label>Password</label>
        <input type="password" id="regPass" required autocomplete="new-password">
        <input type="hidden" id="regToken">
        <div style="margin-top:1rem">
          <button type="submit" style="width:100%">Registrati e unisciti</button>
        </div>
      </form>
    </div>

    <div style="margin-top:1rem;text-align:center">
      <a href="/" style="color:var(--muted);font-size:0.75rem;text-decoration:none">← Sito pubblico</a>
    </div>
  </div>
</div>

<script>
'use strict';

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showMsg(text, isErr) {
  const el = document.getElementById('msgBox');
  el.innerHTML = `<div class="msg ${isErr ? 'err' : 'ok'}">${esc(text)}</div>`;
}

// Parse invite token from URL
const params = new URLSearchParams(location.search);
const token = params.get('token');
if (token) {
  document.getElementById('regToken').value = token;
  // Auto-switch to register tab
  document.querySelector('[data-tab="register"]').click();
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// Login
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  try {
    const res = await fetch('/auth/user/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: pass}),
    });
    if (!res.ok) {
      const err = await res.json();
      showMsg(err.detail || 'Errore login', true);
      return;
    }
    // If came from invite, join the league first if already have account
    if (token) {
      await fetch('/auth/user/join', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({invite_token: token}),
      });
    }
    window.location.href = '/coach/';
  } catch(err) {
    showMsg('Errore di rete', true);
  }
});

// Register
document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  const invite_token = document.getElementById('regToken').value;

  if (!invite_token) {
    showMsg('Token invito mancante. Usa il link ricevuto dal presidente della lega.', true);
    return;
  }

  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, password, invite_token}),
    });
    const data = await res.json();
    if (!res.ok) {
      showMsg(data.detail || 'Errore registrazione', true);
      return;
    }
    window.location.href = '/coach/';
  } catch(err) {
    showMsg('Errore di rete', true);
  }
});
</script>
</body>
</html>
