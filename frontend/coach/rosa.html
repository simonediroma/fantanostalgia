<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FantaNostalgia — Gestione Rosa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/coach/css/coach.css">
</head>
<body>

<div class="topbar">
  <div class="row-gap">
    <a href="/coach/" style="color:var(--muted);font-size:0.7rem;text-decoration:none">← Leghe</a>
    <span class="logo" id="teamTitle">Gestione Rosa</span>
  </div>
  <div class="row-gap">
    <span id="statusBadge"></span>
    <a id="punteggiLink" href="#" style="color:var(--accent2);font-family:var(--font-pixel);font-size:0.5rem;text-decoration:none">Punteggi</a>
    <button class="secondary" id="logoutBtn" style="font-size:0.5rem">Esci</button>
  </div>
</div>

<div class="content">
  <div id="msgBox"></div>
  <div id="gpBanner"></div>
  <div id="poolEmpty" style="display:none">
    <div class="panel">
      <p style="color:var(--muted)">Il pool di giocatori nostalgia non è ancora stato assegnato dall'amministratore. Riprova più tardi.</p>
    </div>
  </div>
  <div id="main" style="display:none">
    <!-- Sections per ruolo renderizzate via JS -->
  </div>
</div>

<div class="lock-bar" id="lockBar" style="display:none">
  <div>
    <span class="progress-text" id="progressText">0/12 assegnati</span>
    <div class="progress-bar-wrap" style="width:200px;margin-top:0.3rem">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <button id="lockBtn" disabled class="danger">Conferma e Blocca</button>
</div>

<script>
'use strict';

const leagueId = (() => {
  const m = location.pathname.match(/\/coach\/lega\/(\d+)/);
  return m ? parseInt(m[1]) : null;
})();

if (!leagueId) {
  window.location.href = '/coach/';
}

document.getElementById('punteggiLink').href = `/coach/lega/${leagueId}/punteggi`;

let _data = null;
let _gpWon = [];

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showMsg(text, isErr) {
  const el = document.getElementById('msgBox');
  el.innerHTML = `<div class="msg ${isErr ? 'err' : 'ok'}">${esc(text)}</div>`;
  if (!isErr) setTimeout(() => { el.innerHTML = ''; }, 3500);
}

function roleLabel(r) {
  return {P:'Portieri', D:'Difensori', C:'Centrocampisti', A:'Attaccanti'}[r] || r;
}

function computeProgress() {
  if (!_data) return {assigned: 0, total: 0};
  const total = _data.nostalgia_pool.length;
  const assigned = _data.nostalgia_pool.filter(p => p.assigned_to_player_current_id !== null).length;
  return {assigned, total};
}

function updateLockBar() {
  if (!_data) return;
  const {assigned, total} = computeProgress();
  const locked = _data.manager.assignments_locked;
  const closed = _data.league.associations_closed;
  const lockBar = document.getElementById('lockBar');
  const lockBtn = document.getElementById('lockBtn');
  const progressText = document.getElementById('progressText');
  const progressFill = document.getElementById('progressFill');

  lockBar.style.display = (locked || closed) ? 'none' : 'flex';
  progressText.textContent = `${assigned}/${total} assegnati`;
  progressFill.style.width = total > 0 ? `${(assigned/total)*100}%` : '0%';
  lockBtn.disabled = assigned < total;
}

function buildCurrentOptions(role, excludeIds) {
  if (!_data) return '';
  const players = _data.current_players.filter(p => p.role === role);
  return players.map(p => {
    const used = excludeIds.has(p.id);
    return `<option value="${p.id}" ${used ? 'disabled' : ''}>${esc(p.name)} (${esc(p.team)}) ${used ? '— già usato' : ''}</option>`;
  }).join('');
}

function render() {
  if (!_data) return;

  const locked = _data.manager.assignments_locked;
  const closed = _data.league.associations_closed;
  const readOnly = locked || closed;

  // Team title
  document.getElementById('teamTitle').textContent = _data.manager.team_name;
  document.title = `${_data.manager.team_name} — FantaNostalgia`;

  // Status badge
  const badge = document.getElementById('statusBadge');
  if (locked) {
    badge.innerHTML = '<span class="badge badge-green">Bloccato</span>';
  } else if (closed) {
    badge.innerHTML = '<span class="badge badge-red">Periodo chiuso</span>';
  } else {
    badge.innerHTML = '<span class="badge">In corso</span>';
  }

  // Gran Premio won banner (only while the rosa is still editable)
  const banner = document.getElementById('gpBanner');
  if (!readOnly && _gpWon.length) {
    const names = _gpWon.map(g => `${esc(g.prize_name)} (${g.prize_role})`).join(', ');
    banner.innerHTML = `<div class="panel" style="border-color:var(--accent)">
      <strong>🏆 Hai vinto un Gran Premio!</strong><br>
      Giocatori vinti: ${names}. Associali nella tua rosa qui sotto, poi ri-blocca.</div>`;
  } else {
    banner.innerHTML = '';
  }

  if (_data.nostalgia_pool.length === 0) {
    document.getElementById('poolEmpty').style.display = 'block';
    document.getElementById('main').style.display = 'none';
    document.getElementById('lockBar').style.display = 'none';
    return;
  }

  document.getElementById('poolEmpty').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  // Build set of already-assigned current player IDs
  const assignedIds = new Set(
    _data.nostalgia_pool
      .filter(p => p.assigned_to_player_current_id !== null)
      .map(p => p.assigned_to_player_current_id)
  );

  const roleOrder = ['P','D','C','A'];
  const main = document.getElementById('main');
  main.innerHTML = '';

  for (const role of roleOrder) {
    const pool = _data.nostalgia_pool.filter(p => p.role === role);
    if (pool.length === 0) continue;

    const section = document.createElement('div');
    section.className = 'role-section';
    section.innerHTML = `<div class="role-header">${roleLabel(role)}</div>`;

    for (const np of pool) {
      const isAssigned = np.assigned_to_player_current_id !== null;
      const row = document.createElement('div');
      row.className = 'player-row';

      // Nostalgia player card
      const nostCard = `
        <div class="player-card nostalgia-card ${isAssigned ? 'assigned' : ''}">
          <div class="player-name">${esc(np.name)}</div>
          <div class="player-meta">${esc(np.team)} · ${esc(np.season)}</div>
        </div>`;

      // Arrow
      const arrow = `<div class="arrow">→</div>`;

      // Right side: select or readonly display
      let rightSide;
      if (readOnly) {
        const assignedName = np.assigned_to_player_current_name || '—';
        rightSide = `<div class="player-card ${isAssigned ? 'assigned' : ''}">
          <div class="player-name">${esc(assignedName)}</div>
          <div class="player-meta">${isAssigned ? 'Assegnato' : 'Non assegnato'}</div>
        </div>`;
      } else {
        // Build options excluding other assigned ids (but allow current assignment)
        const excludeSet = new Set(assignedIds);
        if (np.assigned_to_player_current_id) excludeSet.delete(np.assigned_to_player_current_id);
        const options = buildCurrentOptions(role, excludeSet);
        const selected = np.assigned_to_player_current_id || '';
        rightSide = `
          <select class="assign-select" data-historic-id="${np.player_historic_id}">
            <option value="">— Seleziona giocatore —</option>
            ${options}
          </select>`;
        if (selected) {
          // We need to set it post-insert; store in data attr
          rightSide = `
            <select class="assign-select" data-historic-id="${np.player_historic_id}" data-selected="${selected}">
              <option value="">— Seleziona giocatore —</option>
              ${options}
            </select>`;
        }
      }

      row.innerHTML = nostCard + arrow + rightSide;
      section.appendChild(row);
    }

    main.appendChild(section);
  }

  // Set selected values after render
  document.querySelectorAll('.assign-select[data-selected]').forEach(sel => {
    const val = sel.dataset.selected;
    if (val) sel.value = val;
  });

  // Attach change handlers
  if (!readOnly) {
    document.querySelectorAll('.assign-select').forEach(sel => {
      sel.addEventListener('change', async () => {
        const historicId = parseInt(sel.dataset.historicId);
        const currentId = sel.value ? parseInt(sel.value) : null;
        await doAssign(historicId, currentId, sel);
      });
    });
  }

  updateLockBar();
}

async function doAssign(historicId, currentId, selectEl) {
  try {
    const res = await fetch(`/coach/league/${leagueId}/assign`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({player_historic_id: historicId, player_current_id: currentId}),
    });
    if (!res.ok) {
      const err = await res.json();
      showMsg(err.detail || 'Errore assegnazione', true);
      // Revert select
      const prev = _data.nostalgia_pool.find(p => p.player_historic_id === historicId);
      if (selectEl && prev) selectEl.value = prev.assigned_to_player_current_id || '';
      return;
    }
    // Update local state
    const np = _data.nostalgia_pool.find(p => p.player_historic_id === historicId);
    if (np) {
      const prev = np.assigned_to_player_current_id;
      np.assigned_to_player_current_id = currentId;
      const cp = _data.current_players.find(p => p.id === currentId);
      np.assigned_to_player_current_name = cp ? cp.name : null;
      // Mark/unmark current players
      if (prev) {
        const prevCp = _data.current_players.find(p => p.id === prev);
        if (prevCp) prevCp.has_nostalgia_assignment = false;
      }
      if (currentId && cp) cp.has_nostalgia_assignment = true;
    }
    render();
  } catch(e) {
    showMsg('Errore di rete', true);
  }
}

document.getElementById('lockBtn').addEventListener('click', async () => {
  if (!confirm('Confermi il blocco delle associazioni? Non potrai più modificarle.')) return;
  try {
    const res = await fetch(`/coach/league/${leagueId}/lock`, {method:'POST'});
    const data = await res.json();
    if (!res.ok) {
      showMsg(data.detail || 'Errore blocco', true);
      return;
    }
    showMsg(data.detail, false);
    await loadData();
  } catch(e) {
    showMsg('Errore di rete', true);
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/user/logout', {method:'POST'});
  window.location.href = '/coach/login';
});

async function loadData() {
  const res = await fetch(`/coach/league/${leagueId}/rosa`);
  if (res.status === 401 || res.status === 403) {
    window.location.href = '/coach/login';
    return;
  }
  _data = await res.json();
  try {
    const gps = await (await fetch(`/league/${leagueId}/granpremio`)).json();
    _gpWon = Array.isArray(gps)
      ? gps.filter(g => g.status === 'resolved' && g.winner_name === _data.manager.name)
      : [];
  } catch { _gpWon = []; }
  render();
}

loadData();
</script>
</body>
</html>
