<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FantaNostalgia — Le mie leghe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <link rel="stylesheet" href="/coach/css/coach.css">
</head>
<body>

<div class="topbar">
  <span class="logo">⚽ FantaNostalgia <span class="ds-badge ds-badge--default">allenatore</span></span>
  <div class="row-gap">
    <span id="userName" style="font-size:0.8rem;color:var(--muted)"></span>
    <button class="ds-button ds-button--secondary" id="logoutBtn" style="font-size:0.5rem">Esci</button>
  </div>
</div>

<div class="content">
  <div id="msgBox"></div>
  <h2 style="font-family:var(--font-pixel);font-size:0.7rem;color:var(--accent);margin-bottom:1.5rem;text-transform:uppercase">
    Le mie leghe
  </h2>

  <div id="leagueList"><div class="ds-empty-state"><div class="ds-empty-state__message">Caricamento…</div></div></div>
</div>

<script>
'use strict';

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function init() {
  let me;
  try {
    const res = await fetch('/auth/user/me');
    if (res.status === 401) {
      window.location.href = '/coach/login';
      return;
    }
    me = await res.json();
  } catch(e) {
    window.location.href = '/coach/login';
    return;
  }

  document.getElementById('userName').textContent = me.name;

  const list = document.getElementById('leagueList');

  if (!me.leagues || me.leagues.length === 0) {
    list.innerHTML = '<div class="ds-empty-state"><div class="ds-empty-state__message">Nessuna lega trovata. Chiedi al presidente di inviarti un link.</div></div>';
    return;
  }

  list.innerHTML = me.leagues.map(l => {
    const locked = l.assignments_locked ? '<span class="ds-badge ds-badge--green">Bloccato</span>' : '';
    const closed = l.associations_closed ? '<span class="ds-badge ds-badge--red">Periodo chiuso</span>' : '';
    return `
      <a href="/coach/lega/${l.league_id}" style="text-decoration:none">
        <div class="league-card">
          <div>
            <div class="league-name">${esc(l.league_name)} ${locked}${closed}</div>
            <div class="league-team">Squadra: ${esc(l.team_name)}</div>
          </div>
          <div style="display:flex;gap:0.5rem">
            <button class="ds-button ds-button--default" style="font-size:0.5rem">Rosa →</button>
            <a href="/coach/lega/${l.league_id}/punteggi" style="text-decoration:none" onclick="event.stopPropagation()">
              <button class="ds-button ds-button--secondary" style="font-size:0.5rem">Punteggi</button>
            </a>
          </div>
        </div>
      </a>
    `;
  }).join('');
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/user/logout', {method:'POST'});
  window.location.href = '/coach/login';
});

init();
</script>
</body>
</html>
