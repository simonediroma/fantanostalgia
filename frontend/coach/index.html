<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FantaNostalgia — Le mie leghe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <link rel="stylesheet" href="/coach/css/coach.css">
  <script src="/shared/design-system.js"></script>
</head>
<body>

<div class="topbar">
  <span class="logo">⚽ FantaNostalgia <span class="ds-badge ds-badge--default">allenatore</span></span>
  <button type="button" class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="topbarActions">☰</button>
  <div class="row-gap topbar-actions" id="topbarActions">
    <span id="userName" style="font-size:0.8rem;color:var(--muted)"></span>
    <button class="ds-button ds-button--secondary" id="logoutBtn" style="font-size:0.5rem">Esci</button>
  </div>
</div>

<div class="content">
  <div id="msgBox"></div>
  <h2 style="font-family:var(--font-pixel);font-size:0.7rem;color:var(--accent);margin-bottom:1.5rem;text-transform:uppercase">
    Le mie leghe
  </h2>

  <div id="leagueList"><div class="ds-empty-state"><div class="ds-empty-state__message">Caricamento…</div></div></div>

  <div id="elevationSlot" style="margin-top:2rem"></div>
</div>

<script>
'use strict';

const DS = window.FantaNostalgiaDS;

// Mobile nav toggle
(function () {
  const btn = document.getElementById('navToggle');
  const nav = document.getElementById('topbarActions');
  if (!btn || !nav) return;
  btn.addEventListener('click', () => {
    const open = nav.classList.toggle('open');
    btn.setAttribute('aria-expanded', String(open));
  });
})();

function renderElevationPanel(me) {
  const slot = document.getElementById('elevationSlot');
  const helpBox = DS.HelpBox({
    title: 'Permessi amministratore',
    children: "L'amministratore gestisce tutte le leghe: import rose e formazioni, apertura buste, sorteggi e punteggi. Puoi richiedere questi permessi al presidente esistente, che dovrà approvarli esplicitamente.",
  });

  let footer;
  if (me.is_admin) {
    footer = document.createElement('p');
    footer.style.cssText = 'margin-top:0.75rem;font-size:0.82rem';
    footer.append('Sei amministratore. ');
    const link = document.createElement('a');
    link.href = '/admin';
    link.textContent = 'Vai al pannello admin →';
    link.style.color = 'var(--accent)';
    footer.appendChild(link);
  } else if (me.elevation_status === 'pending') {
    footer = DS.Badge({ children: 'Richiesta in attesa di approvazione', variant: 'default' });
    footer.style.marginTop = '0.75rem';
  } else {
    const btn = DS.Button({
      children: 'Richiedi permessi admin', variant: 'secondary',
      onClick: async () => {
        btn.disabled = true;
        try {
          const res = await fetch('/auth/user/elevation-request', { method: 'POST' });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          renderElevationPanel({ ...me, elevation_status: 'pending' });
        } catch (e) {
          btn.disabled = false;
          document.getElementById('msgBox').innerHTML =
            `<div class="ds-message ds-message--err">${e.message}</div>`;
        }
      },
    });
    btn.style.cssText = 'margin-top:0.75rem;font-size:0.75rem';
    footer = btn;
  }

  slot.replaceChildren(DS.Panel({ children: [helpBox, footer] }));
}

async function init() {
  let me;
  try {
    const res = await fetch('/auth/user/me');
    if (res.status === 401) {
      window.location.href = '/coach/login';
      return;
    }
    me = await res.json();
  } catch(e) {
    window.location.href = '/coach/login';
    return;
  }

  document.getElementById('userName').textContent = me.name;
  renderElevationPanel(me);

  const list = document.getElementById('leagueList');

  if (!me.leagues || me.leagues.length === 0) {
    list.replaceChildren(DS.EmptyState({ message: 'Nessuna lega trovata. Chiedi al presidente di inviarti un link.' }));
    return;
  }

  list.replaceChildren(...me.leagues.map(l => {
    const nameDiv = document.createElement('div');
    nameDiv.className = 'league-name';
    nameDiv.append(`${l.league_name} `);
    if (l.assignments_locked) nameDiv.appendChild(DS.Badge({ children: 'Bloccato', variant: 'green' }));
    if (l.associations_closed) nameDiv.appendChild(DS.Badge({ children: 'Periodo chiuso', variant: 'red' }));

    const teamDiv = document.createElement('div');
    teamDiv.className = 'league-team';
    teamDiv.textContent = `Squadra: ${l.team_name}`;

    const infoDiv = document.createElement('div');
    infoDiv.append(nameDiv, teamDiv);

    const rosaBtn = DS.Button({ children: 'Rosa →', variant: 'default' });
    rosaBtn.style.fontSize = '0.5rem';

    const punteggiBtn = DS.Button({ children: 'Punteggi', variant: 'secondary' });
    punteggiBtn.style.fontSize = '0.5rem';
    const punteggiLink = document.createElement('a');
    punteggiLink.href = `/coach/lega/${l.league_id}/punteggi`;
    punteggiLink.style.textDecoration = 'none';
    punteggiLink.addEventListener('click', e => e.stopPropagation());
    punteggiLink.appendChild(punteggiBtn);

    const actionsDiv = document.createElement('div');
    actionsDiv.style.cssText = 'display:flex;gap:0.5rem';
    actionsDiv.append(rosaBtn, punteggiLink);

    const card = document.createElement('div');
    card.className = 'league-card';
    card.append(infoDiv, actionsDiv);

    const cardLink = document.createElement('a');
    cardLink.href = `/coach/lega/${l.league_id}`;
    cardLink.style.textDecoration = 'none';
    cardLink.appendChild(card);
    return cardLink;
  }));
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/user/logout', {method:'POST'});
  window.location.href = '/coach/login';
});

init();
</script>
</body>
</html>
