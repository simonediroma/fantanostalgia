<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FantaNostalgia — I miei punteggi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <link rel="stylesheet" href="/coach/css/coach.css">
  <script src="/shared/design-system.js"></script>
</head>
<body>

<div class="topbar">
  <div class="row-gap">
    <a href="/coach/" style="color:var(--muted);font-size:0.7rem;text-decoration:none">← Leghe</a>
    <span class="logo" id="pageTitle">I miei punteggi</span>
  </div>
  <button type="button" class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="topbarActions">☰</button>
  <div class="row-gap topbar-actions" id="topbarActions">
    <a id="rosaLink" href="#" style="color:var(--accent2);font-family:var(--font-pixel);font-size:0.5rem;text-decoration:none">Rosa</a>
    <a id="statisticheLink" href="#" style="color:var(--accent2);font-family:var(--font-pixel);font-size:0.5rem;text-decoration:none">Statistiche</a>
    <button class="ds-button ds-button--secondary" id="logoutBtn" style="font-size:0.5rem">Esci</button>
  </div>
</div>

<div class="content">
  <div id="msgBox"></div>
  <div id="main" style="display:none">
    <div class="ds-panel ds-panel--default" style="margin-bottom:1.5rem">
      <div style="display:flex;gap:2rem;flex-wrap:wrap">
        <div>
          <div style="color:var(--muted);font-family:var(--font-pixel);font-size:0.5rem;text-transform:uppercase;margin-bottom:0.3rem">FantaNostalgia</div>
          <div style="font-family:var(--font-pixel);font-size:1rem;color:var(--accent)" id="totalNostalgia">—</div>
          <div style="color:var(--muted);font-size:0.78rem;margin-top:0.2rem" id="rankNostalgia"></div>
        </div>
        <div>
          <div style="color:var(--muted);font-family:var(--font-pixel);font-size:0.5rem;text-transform:uppercase;margin-bottom:0.3rem">Normale</div>
          <div style="font-family:var(--font-pixel);font-size:1rem;color:var(--accent2)" id="totalNormal">—</div>
          <div style="color:var(--muted);font-size:0.78rem;margin-top:0.2rem" id="rankNormal"></div>
        </div>
      </div>
    </div>

    <div id="matchdayTable"></div>
  </div>
</div>

<script>
'use strict';

const DS = window.FantaNostalgiaDS;

// Mobile nav toggle
(function () {
  const btn = document.getElementById('navToggle');
  const nav = document.getElementById('topbarActions');
  if (!btn || !nav) return;
  btn.addEventListener('click', () => {
    const open = nav.classList.toggle('open');
    btn.setAttribute('aria-expanded', String(open));
  });
})();

const leagueId = (() => {
  const m = location.pathname.match(/\/coach\/lega\/(\d+)/);
  return m ? parseInt(m[1]) : null;
})();

if (!leagueId) window.location.href = '/coach/';

document.getElementById('rosaLink').href = `/coach/lega/${leagueId}`;
document.getElementById('statisticheLink').href = `/coach/lega/${leagueId}/statistiche`;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function showMsg(msg, isErr = false) {
  const el = document.getElementById('msgBox');
  el.innerHTML = `<div class="ds-message ds-message--${isErr ? 'err' : 'ok'}">${esc(msg)}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 4000);
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/user/logout', { method: 'POST' });
  window.location.href = '/coach/login';
});

async function load() {
  try {
    const res = await fetch(`/coach/league/${leagueId}/punteggi`);
    if (res.status === 401 || res.status === 403) { window.location.href = '/coach/login'; return; }
    const data = await res.json();
    if (!res.ok) { throw new Error(data.detail || res.statusText); }
    document.getElementById('pageTitle').textContent = `${esc(data.manager.name)} — Punteggi`;
    document.title = `FantaNostalgia — ${data.manager.name}`;

    const t = data.totals;
    document.getElementById('totalNostalgia').textContent = t.score_nostalgia != null ? t.score_nostalgia.toFixed(1) : '—';
    document.getElementById('totalNormal').textContent = t.score_normal != null ? t.score_normal.toFixed(1) : '—';
    document.getElementById('rankNostalgia').textContent = t.rank_nostalgia != null ? `#${t.rank_nostalgia} in classifica` : '';
    document.getElementById('rankNormal').textContent = t.rank_normal != null ? `#${t.rank_normal} in classifica` : '';

    const el = document.getElementById('matchdayTable');
    if (!data.matchdays.length) {
      el.replaceChildren(DS.EmptyState({ message: 'Nessuna giornata disputata ancora.' }));
    } else {
      const dettaglioLink = md => {
        const a = document.createElement('a');
        a.href = `/lega/${leagueId}/giornata/${md.matchday_current}`;
        a.style.cssText = 'color:var(--accent);font-family:var(--font-pixel);font-size:0.5rem;text-transform:uppercase';
        a.textContent = 'Dettaglio →';
        return a;
      };
      el.replaceChildren(DS.Table({
        columns: [
          { label: 'Giornata', pixel: true, color: 'var(--accent2)' },
          { label: 'Storica', color: 'var(--muted)' },
          { label: 'FantaNostalgia', color: 'var(--green)' },
          { label: 'Normale', color: 'var(--accent2)' },
          { label: '' },
        ],
        rows: data.matchdays.map(md => [
          `G${md.matchday_current}`,
          `G${md.matchday_historic}`,
          md.score_nostalgia != null ? md.score_nostalgia.toFixed(1) : '—',
          md.score_normal != null ? md.score_normal.toFixed(1) : '—',
          dettaglioLink(md),
        ]),
      }));
    }

    document.getElementById('main').style.display = 'block';
  } catch (err) {
    showMsg(err.message, true);
  }
}

load();
</script>
</body>
</html>
