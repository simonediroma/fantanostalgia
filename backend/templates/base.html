<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FantaNostalgia{% endblock %}</title>
  <meta property="og:title" content="{% block og_title %}FantaNostalgia{% endblock %}">
  <meta property="og:description" content="{% block og_description %}La storia incontra il presente{% endblock %}">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="/shared/design-system.css">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <a href="/" class="logo">⚽ FantaNostalgia</a>
    <button type="button" class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="siteNav">☰</button>
    <nav id="siteNav">
      {% block nav %}{% endblock %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>FantaNostalgia — La storia incontra il presente</footer>
  <script>
  (function () {
    var btn = document.getElementById('navToggle');
    var nav = document.getElementById('siteNav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function () {
      var open = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', String(open));
    });
  }());
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
