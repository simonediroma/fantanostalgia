<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FantaNostalgia{% endblock %}</title>
  <meta property="og:title" content="{% block og_title %}FantaNostalgia{% endblock %}">
  <meta property="og:description" content="{% block og_description %}La storia incontra il presente{% endblock %}">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">⚽ FantaNostalgia</a>
    <nav>
      {% block nav %}{% endblock %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>FantaNostalgia — La storia incontra il presente</footer>
</body>
</html>
