version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ENV: development
      DB_LOCAL_PATH: /data/fantanostalgia.db
    volumes:
      - ./backend:/app
      - ./database/schema.sql:/app/database/schema.sql
      - db_data:/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:8080"
    volumes:
      - ./frontend/admin:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  db_data:
