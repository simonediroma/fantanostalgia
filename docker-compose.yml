version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      ENV: development
      DB_LOCAL_PATH: /data/fantanostalgia.db
    volumes:
      - ./backend:/app
      - ./database:/app/database
      - db_data:/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:8080"
    volumes:
      - ./frontend/public:/usr/share/nginx/html
      - ./frontend/src:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  db_data:
