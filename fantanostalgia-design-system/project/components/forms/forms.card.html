<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { WizardSteps, Input, DropZone } = window.FantaNostalgiaDesignSystem_90de16;
    const lbl = (t) => (
      <div style={{ fontFamily:'var(--font-pixel)', fontSize:'0.38rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:'0.5rem', marginTop:'0.75rem' }}>{t}</div>
    );
    function App() {
      const [file, setFile] = React.useState(null);
      return (
        <div style={{padding:'1.25rem'}}>
          {lbl('WizardSteps')}
          <WizardSteps steps={['Listone','Mapping','Buste','Giornate']} current={2} />

          {lbl('Input')}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',maxWidth:'500px'}}>
            <Input label="Nome lega" placeholder="es. Erculo Tuo" />
            <Input label="Budget" type="number" placeholder="500" error="Minimo 100 crediti" />
            <Input label="Stagione corrente" placeholder="2024/25" helpText="Stagione in corso" />
            <Input label="Password" type="password" disabled />
          </div>

          {lbl('DropZone')}
          <DropZone
            accept=".xlsx"
            label="Trascina il listone Excel qui"
            sublabel='Foglio "TutteLeRose" — 2 squadre affiancate'
            fileName={file ? file.name : undefined}
            onFile={setFile}
          />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
