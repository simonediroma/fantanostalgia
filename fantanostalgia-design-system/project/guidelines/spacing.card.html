<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing Scale" subtitle="4px base — space-1 through space-12" -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { padding: 1rem 1.5rem; }
    .scale { display: flex; flex-direction: column; gap: 6px; }
    .row { display: flex; align-items: center; gap: 0.75rem; }
    .label { font-family: var(--font-data); font-size: 0.72rem; color: var(--muted); width: 140px; flex-shrink: 0; }
    .bar-wrap { flex: 1; height: 12px; background: #1a1a40; border: 1px solid var(--border); }
    .bar { height: 100%; background: var(--accent2); }
  </style>
</head>
<body>
  <div class="scale">
    <div class="row"><div class="label">--space-1 / 4px</div><div class="bar-wrap"><div class="bar" style="width:4px"></div></div></div>
    <div class="row"><div class="label">--space-2 / 8px</div><div class="bar-wrap"><div class="bar" style="width:8px"></div></div></div>
    <div class="row"><div class="label">--space-3 / 12px</div><div class="bar-wrap"><div class="bar" style="width:12px"></div></div></div>
    <div class="row"><div class="label">--space-4 / 16px</div><div class="bar-wrap"><div class="bar" style="width:16px"></div></div></div>
    <div class="row"><div class="label">--space-5 / 20px</div><div class="bar-wrap"><div class="bar" style="width:20px"></div></div></div>
    <div class="row"><div class="label">--space-6 / 24px</div><div class="bar-wrap"><div class="bar" style="width:24px"></div></div></div>
    <div class="row"><div class="label">--space-8 / 32px</div><div class="bar-wrap"><div class="bar" style="width:32px"></div></div></div>
    <div class="row"><div class="label">--space-10 / 40px</div><div class="bar-wrap"><div class="bar" style="width:40px"></div></div></div>
    <div class="row"><div class="label">--space-12 / 48px</div><div class="bar-wrap"><div class="bar" style="width:48px"></div></div></div>
  </div>
</body>
</html>
